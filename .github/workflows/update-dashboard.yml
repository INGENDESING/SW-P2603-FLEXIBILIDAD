name: Update Flexibilidad Dashboard

on:
  push:
    branches: [ main, master ]
    paths:
      - 'SUCCION DE BOMBA DE RECIRCULACION*/**/*.md'
      - 'DESCARGA DE BOMBA DE RECIRCULACION*/**/*.md'
      - 'DESCARGA BOMBA*/**/*.md'
      - 'LINEA DE BOMBA DE VACIO*/**/*.md'
      - '**/ResultadosGraficos*'
      - 'scripts/**'
      - 'dashboard/**'
      - '.github/workflows/**'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Parse CAESAR II reports
        run: |
          python scripts/parse_caesar_md.py

      - name: Check for changes
        id: verify-changes
        run: |
          if git diff --quiet dashboard/_data/lineas.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated JSON
        if: steps.verify-changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/_data/lineas.json
          git commit -m "chore: update lineas.json from CAESAR II reports"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data
          path: dashboard/_data/lineas.json
          retention-days: 30

  deploy-pages:
    needs: update-dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
